services:
  mongodb:
    image: mongo:7
    container_name: pockemon-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pockemon-backend
    depends_on:
      - mongodb
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/pockemon
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '3000:3000'
    command: npm run start:dev
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pockemon-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5173:5173'
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
